services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: arfims_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - arfims
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:latest
    container_name: arfims_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - arfims
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: arfims_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: arfims
      MYSQL_USER: arfims
      MYSQL_PASSWORD: arfims123
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - arfims

  redis:
    image: redis:alpine
    container_name: arfims_redis
    restart: unless-stopped
    networks:
      - arfims

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: arfims_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work --sleep=3 --tries=3
    networks:
      - arfims
    depends_on:
      - mysql
      - redis

networks:
  arfims:
    driver: bridge

volumes:
  mysql_data:
    driver: local
